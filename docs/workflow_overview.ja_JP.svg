<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">Simple Deform Helper V2 ワークフロー</title>
  <desc id="desc">オブジェクトの選択から複合変形とチェーンケージを作成するまでの 4 ステップ。</desc>
  <rect width="1600" height="720" fill="#151a20"/>
  <rect x="40" y="38" width="1520" height="644" rx="8" fill="#20262e" stroke="#3d4b59" stroke-width="2"/>

  <text x="80" y="102" fill="#f5f8fb" font-family="Segoe UI, Noto Sans JP, sans-serif" font-size="36" font-weight="700">オブジェクトから完成形まで、見えるワークフロー</text>
  <text x="80" y="139" fill="#aebbc8" font-family="Segoe UI, Noto Sans JP, sans-serif" font-size="19">モデリング画面で選択、組み合わせ、操作し、必要ならチェーンへ拡張します。</text>

  <g font-family="Segoe UI, sans-serif">
    <g transform="translate(80 190)">
      <rect width="330" height="350" rx="8" fill="#252e37" stroke="#43515f"/>
      <circle cx="34" cy="34" r="18" fill="#8fd6e7"/>
      <text x="34" y="41" text-anchor="middle" fill="#152027" font-size="20" font-weight="700">1</text>
      <text x="65" y="42" fill="#f5f8fb" font-family="Noto Sans JP, sans-serif" font-size="23" font-weight="700">対象を選択</text>
      <g transform="translate(52 90)" fill="none" stroke="#8fd6e7" stroke-width="4">
        <path d="M12 118 C38 28 94 28 120 118 S202 208 228 118"/>
        <path d="M12 96 C38 6 94 6 120 96 S202 186 228 96" opacity=".38"/>
        <line x1="12" y1="72" x2="12" y2="142" opacity=".5"/>
        <line x1="228" y1="72" x2="228" y2="142" opacity=".5"/>
      </g>
      <text x="165" y="274" text-anchor="middle" fill="#dce4ea" font-family="Noto Sans JP, sans-serif" font-size="18">メッシュ · カーブ · サーフェス · テキスト</text>
      <text x="165" y="307" text-anchor="middle" fill="#91a1af" font-family="Noto Sans JP, sans-serif" font-size="15">オブジェクトモード · 十分な分割数</text>
    </g>

    <path d="M428 365 H452" stroke="#627383" stroke-width="3"/>
    <path d="M450 356 L462 365 L450 374" fill="none" stroke="#627383" stroke-width="3"/>

    <g transform="translate(470 190)">
      <rect width="330" height="350" rx="8" fill="#252e37" stroke="#43515f"/>
      <circle cx="34" cy="34" r="18" fill="#8fd6e7"/>
      <text x="34" y="41" text-anchor="middle" fill="#152027" font-size="20" font-weight="700">2</text>
      <text x="65" y="42" fill="#f5f8fb" font-family="Noto Sans JP, sans-serif" font-size="23" font-weight="700">ケージを追加して適合</text>
      <g transform="translate(66 78)" fill="none">
        <path d="M64 16 H184 L216 48 V210 H96 L64 178 Z" stroke="#299bdd" stroke-width="4"/>
        <path d="M64 16 L96 48 H216 M96 48 V210 M64 178 H184 V16 M184 178 L216 210" stroke="#299bdd" stroke-width="2" opacity=".72"/>
        <path d="M126 52 C102 92 104 136 132 176" stroke="#f19a38" stroke-width="6"/>
        <circle cx="126" cy="52" r="7" fill="#f19a38"/>
        <circle cx="132" cy="176" r="7" fill="#f19a38"/>
      </g>
      <text x="165" y="307" text-anchor="middle" fill="#dce4ea" font-family="Noto Sans JP, sans-serif" font-size="17">自動または X / Y / Z 軸 · 整列と適合</text>
    </g>

    <path d="M818 365 H842" stroke="#627383" stroke-width="3"/>
    <path d="M840 356 L852 365 L840 374" fill="none" stroke="#627383" stroke-width="3"/>

    <g transform="translate(860 190)">
      <rect width="330" height="350" rx="8" fill="#252e37" stroke="#43515f"/>
      <circle cx="34" cy="34" r="18" fill="#8fd6e7"/>
      <text x="34" y="41" text-anchor="middle" fill="#152027" font-size="20" font-weight="700">3</text>
      <text x="65" y="42" fill="#f5f8fb" font-family="Noto Sans JP, sans-serif" font-size="23" font-weight="700">変形を組み立てる</text>
      <g transform="translate(38 83)">
        <rect width="254" height="42" rx="6" fill="#31404c" stroke="#f19a38"/>
        <text x="18" y="27" fill="#f5f8fb" font-family="Noto Sans JP, sans-serif" font-size="17" font-weight="600">曲げ</text>
        <text x="228" y="27" text-anchor="end" fill="#f19a38" font-size="15">70°</text>
        <rect y="52" width="254" height="42" rx="6" fill="#31404c" stroke="#a987d4"/>
        <text x="18" y="79" fill="#f5f8fb" font-family="Noto Sans JP, sans-serif" font-size="17" font-weight="600">ねじり</text>
        <text x="228" y="79" text-anchor="end" fill="#c1a2e5" font-size="15">110°</text>
        <rect y="104" width="254" height="42" rx="6" fill="#31404c" stroke="#e8b45f"/>
        <text x="18" y="131" fill="#f5f8fb" font-family="Noto Sans JP, sans-serif" font-size="17" font-weight="600">テーパー</text>
        <text x="228" y="131" text-anchor="end" fill="#e8b45f" font-size="15">0.35</text>
        <rect y="156" width="254" height="42" rx="6" fill="#31404c" stroke="#72d5ac"/>
        <text x="18" y="183" fill="#f5f8fb" font-family="Noto Sans JP, sans-serif" font-size="17" font-weight="600">伸縮</text>
        <text x="228" y="183" text-anchor="end" fill="#72d5ac" font-size="15">0.20</text>
      </g>
      <text x="165" y="307" text-anchor="middle" fill="#dce4ea" font-family="Noto Sans JP, sans-serif" font-size="17">並べ替え · ミュート · アニメーション · ライブ確認</text>
    </g>

    <path d="M1208 365 H1232" stroke="#627383" stroke-width="3"/>
    <path d="M1230 356 L1242 365 L1230 374" fill="none" stroke="#627383" stroke-width="3"/>

    <g transform="translate(1250 190)">
      <rect width="270" height="350" rx="8" fill="#252e37" stroke="#43515f"/>
      <circle cx="34" cy="34" r="18" fill="#8fd6e7"/>
      <text x="34" y="41" text-anchor="middle" fill="#152027" font-size="20" font-weight="700">4</text>
      <text x="65" y="42" fill="#f5f8fb" font-family="Noto Sans JP, sans-serif" font-size="23" font-weight="700">チェーンへ拡張</text>
      <g transform="translate(31 88)" fill="none" stroke="#299bdd">
        <path d="M8 148 C58 28 125 28 198 142" stroke="#f19a38" stroke-width="7"/>
        <path d="M10 104 L70 52 L110 100 L50 158 Z" stroke-width="3"/>
        <path d="M76 51 L137 69 L151 130 L91 112 Z" stroke-width="3"/>
        <path d="M143 70 L202 112 L210 174 L151 131 Z" stroke-width="3"/>
        <line x1="73" y1="47" x2="76" y2="116" stroke="#72d5ac" stroke-width="4"/>
        <line x1="138" y1="65" x2="151" y2="135" stroke="#72d5ac" stroke-width="4"/>
      </g>
      <text x="135" y="274" text-anchor="middle" fill="#dce4ea" font-family="Noto Sans JP, sans-serif" font-size="17">各セグメントを個別に編集</text>
      <text x="135" y="304" text-anchor="middle" fill="#91a1af" font-family="Noto Sans JP, sans-serif" font-size="15">間隔 · 継ぎ目 · 一括編集</text>
    </g>
  </g>

  <rect x="80" y="574" width="1440" height="70" rx="8" fill="#182027" stroke="#315248"/>
  <text x="105" y="604" fill="#72d5ac" font-family="Segoe UI, Noto Sans JP, sans-serif" font-size="17" font-weight="700">構造から非破壊</text>
  <text x="105" y="630" fill="#c5d1da" font-family="Segoe UI, Noto Sans JP, sans-serif" font-size="16">Geometry Nodes のステージは Blender のモディファイアスタックに残り、コントローラー、順序、表示、値をアニメーションできます。</text>
</svg>
