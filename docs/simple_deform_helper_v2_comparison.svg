<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Simple Deform Helper V2 multilingual workflow comparison</title>
  <desc id="desc">A vendor-neutral comparison of a unified cage workflow with common Maya, 3ds Max, MODO, and Cinema 4D deformation workflows.</desc>
  <rect width="1800" height="1200" fill="#151a20"/>
  <rect x="48" y="42" width="1704" height="1110" rx="18" fill="#20262e" stroke="#3d4b59" stroke-width="2"/>

  <text x="88" y="104" fill="#f5f8fb" font-family="Segoe UI, Noto Sans CJK SC, Noto Sans JP, Noto Sans KR, sans-serif" font-size="40" font-weight="700">世界领先的简易变形器 V2</text>
  <text x="88" y="144" fill="#8fd6e7" font-family="Segoe UI, sans-serif" font-size="24" font-weight="600">Simple Deform Helper V2</text>
  <text x="88" y="178" fill="#b4c1cc" font-family="Segoe UI, Noto Sans JP, Noto Sans KR, sans-serif" font-size="18">シンプル変形ヘルパー V2  ·  심플 디포머 헬퍼 V2</text>
  <text x="1710" y="104" text-anchor="end" fill="#72d5ac" font-family="Segoe UI, sans-serif" font-size="18" font-weight="600">ONE CAGE  ·  ORDERED LAYERS  ·  CONNECTED CHAINS</text>

  <rect x="88" y="216" width="1624" height="94" rx="9" fill="#2a333d"/>
  <text x="112" y="250" fill="#aebbc8" font-family="Segoe UI, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700">WORKFLOW DIMENSION</text>
  <text x="112" y="280" fill="#dce4ea" font-family="Segoe UI, Noto Sans CJK SC, Noto Sans JP, Noto Sans KR, sans-serif" font-size="15">功能维度 · 機能 · 기능</text>
  <text x="510" y="262" fill="#8fd6e7" font-family="Segoe UI, sans-serif" font-size="23" font-weight="700">Simple Deform Helper V2</text>
  <text x="510" y="288" fill="#72d5ac" font-family="Segoe UI, Noto Sans CJK SC, sans-serif" font-size="15">统一笼式工作流 · 統合ケージ · 통합 케이지</text>
  <text x="942" y="270" fill="#e7b37e" font-family="Segoe UI, sans-serif" font-size="21" font-weight="700">Maya</text>
  <text x="1144" y="270" fill="#e7b37e" font-family="Segoe UI, sans-serif" font-size="21" font-weight="700">3ds Max</text>
  <text x="1358" y="270" fill="#e7b37e" font-family="Segoe UI, sans-serif" font-size="21" font-weight="700">MODO</text>
  <text x="1530" y="270" fill="#e7b37e" font-family="Segoe UI, sans-serif" font-size="21" font-weight="700">Cinema 4D</text>

  <g font-family="Segoe UI, Noto Sans CJK SC, Noto Sans JP, Noto Sans KR, sans-serif" font-size="17">
    <g transform="translate(0 326)"><rect x="88" y="0" width="1624" height="76" fill="#252e37"/><text x="112" y="28" fill="#f5f8fb" font-weight="600">Single-cage multi-deform</text><text x="112" y="54" fill="#aebbc8" font-size="14">单笼多形变 · 1つのケージで複合 · 단일 케이지 다중 변형</text><text x="510" y="32" fill="#72d5ac" font-weight="700">✓ Bend + Twist + Taper + Stretch</text><text x="510" y="58" fill="#d9f4e8" font-size="14">One ordered layer list</text><text x="942" y="44" fill="#d8a875">△ Separate deformers / rigs</text><text x="1144" y="44" fill="#d8a875">△ Modifier stack</text><text x="1358" y="44" fill="#d8a875">△ Deformer stack</text><text x="1530" y="44" fill="#d8a875">△ Deformer stack</text></g>
    <g transform="translate(0 402)"><rect x="88" y="0" width="1624" height="76" fill="#20262e"/><text x="112" y="28" fill="#f5f8fb" font-weight="600">Live deformation order</text><text x="112" y="54" fill="#aebbc8" font-size="14">实时形变顺序 · 実行順 · 실행 순서</text><text x="510" y="32" fill="#72d5ac" font-weight="700">✓ Drag layers and preview immediately</text><text x="510" y="58" fill="#d9f4e8" font-size="14">Bend → Twist → Taper → Stretch</text><text x="942" y="44" fill="#c3ced7">△ Stack / node ordering</text><text x="1144" y="44" fill="#c3ced7">△ Modifier ordering</text><text x="1358" y="44" fill="#c3ced7">△ Stack ordering</text><text x="1530" y="44" fill="#c3ced7">△ Stack ordering</text></g>
    <g transform="translate(0 478)"><rect x="88" y="0" width="1624" height="76" fill="#252e37"/><text x="112" y="28" fill="#f5f8fb" font-weight="600">Connected chained cages</text><text x="112" y="54" fill="#aebbc8" font-size="14">链式笼 · チェーンケージ · 체인 케이지</text><text x="510" y="32" fill="#72d5ac" font-weight="700">✓ Segment + gap + auto-reconnect</text><text x="510" y="58" fill="#d9f4e8" font-size="14">Preserve the overall range</text><text x="942" y="44" fill="#d8a875">△ Manual rig / deformer links</text><text x="1144" y="44" fill="#d8a875">△ Manual chain setup</text><text x="1358" y="44" fill="#d8a875">△ Manual setup</text><text x="1530" y="44" fill="#d8a875">△ Manual setup</text></g>
    <g transform="translate(0 554)"><rect x="88" y="0" width="1624" height="76" fill="#20262e"/><text x="112" y="28" fill="#f5f8fb" font-weight="600">Independent top / bottom ends</text><text x="112" y="54" fill="#aebbc8" font-size="14">上下端独立 · 上下端の個別操作 · 상하단 독립</text><text x="510" y="32" fill="#72d5ac" font-weight="700">✓ Length + scale + offset per end</text><text x="510" y="58" fill="#d9f4e8" font-size="14">No forced center symmetry</text><text x="942" y="44" fill="#c3ced7">△ Depends on rig setup</text><text x="1144" y="44" fill="#c3ced7">△ Depends on modifier setup</text><text x="1358" y="44" fill="#c3ced7">△ Depends on setup</text><text x="1530" y="44" fill="#c3ced7">△ Depends on setup</text></g>
    <g transform="translate(0 630)"><rect x="88" y="0" width="1624" height="76" fill="#252e37"/><text x="112" y="28" fill="#f5f8fb" font-weight="600">Bend trend and axis preview</text><text x="112" y="54" fill="#aebbc8" font-size="14">弯曲趋势与轴向 · 曲げ傾向 · 구부리기 경향</text><text x="510" y="32" fill="#72d5ac" font-weight="700">✓ 6 faces × 2 trends + Align &amp; Fit</text><text x="510" y="58" fill="#d9f4e8" font-size="14">Shape-aware viewport controllers</text><text x="942" y="44" fill="#c3ced7">△ Viewport / rig setup</text><text x="1144" y="44" fill="#c3ced7">△ Viewport / modifier setup</text><text x="1358" y="44" fill="#c3ced7">△ Viewport setup</text><text x="1530" y="44" fill="#c3ced7">△ Viewport setup</text></g>
    <g transform="translate(0 706)"><rect x="88" y="0" width="1624" height="76" fill="#20262e"/><text x="112" y="28" fill="#f5f8fb" font-weight="600">Non-destructive node workflow</text><text x="112" y="54" fill="#aebbc8" font-size="14">非破坏节点流程 · ノード非破壊 · 비파괴 노드</text><text x="510" y="32" fill="#72d5ac" font-weight="700">✓ Geometry Nodes + modifier stack</text><text x="510" y="58" fill="#d9f4e8" font-size="14">Inspectable and animatable</text><text x="942" y="44" fill="#c3ced7">△ Native graph / rig</text><text x="1144" y="44" fill="#c3ced7">△ Native graph / modifier</text><text x="1358" y="44" fill="#c3ced7">△ Native graph</text><text x="1530" y="44" fill="#c3ced7">△ Native graph</text></g>
    <g transform="translate(0 782)"><rect x="88" y="0" width="1624" height="76" fill="#252e37"/><text x="112" y="28" fill="#f5f8fb" font-weight="600">Boundary and overlap safety</text><text x="112" y="54" fill="#aebbc8" font-size="14">边界与防交叠 · 境界保護 · 경계 보호</text><text x="510" y="32" fill="#72d5ac" font-weight="700">✓ Object bounds + non-overlap chain logic</text><text x="510" y="58" fill="#d9f4e8" font-size="14">Optional gap and seam sync</text><text x="942" y="44" fill="#c3ced7">△ Manual constraints</text><text x="1144" y="44" fill="#c3ced7">△ Manual constraints</text><text x="1358" y="44" fill="#c3ced7">△ Manual constraints</text><text x="1530" y="44" fill="#c3ced7">△ Manual constraints</text></g>
    <g transform="translate(0 858)"><rect x="88" y="0" width="1624" height="76" fill="#20262e"/><text x="112" y="28" fill="#f5f8fb" font-weight="600">Localization and repeatability</text><text x="112" y="54" fill="#aebbc8" font-size="14">多语言与可重复 · 多言語 · 다국어</text><text x="510" y="32" fill="#72d5ac" font-weight="700">✓ EN / 简中 / 日本語 / 한국어</text><text x="510" y="58" fill="#d9f4e8" font-size="14">Same controls, same semantics</text><text x="942" y="44" fill="#c3ced7">△ Host language coverage</text><text x="1144" y="44" fill="#c3ced7">△ Host language coverage</text><text x="1358" y="44" fill="#c3ced7">△ Host language coverage</text><text x="1530" y="44" fill="#c3ced7">△ Host language coverage</text></g>
  </g>

  <rect x="88" y="970" width="1624" height="92" rx="8" fill="#182027" stroke="#315248"/>
  <text x="112" y="1003" fill="#72d5ac" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700">V2 advantage in one sentence</text>
  <text x="112" y="1034" fill="#d9f4e8" font-family="Segoe UI, Noto Sans CJK SC, Noto Sans JP, Noto Sans KR, sans-serif" font-size="17">A single, ordered cage stack makes compound deformation, chained segments, and asymmetric end editing visible and controllable in real time.</text>
  <text x="112" y="1058" fill="#b4c1cc" font-family="Segoe UI, Noto Sans CJK SC, Noto Sans JP, Noto Sans KR, sans-serif" font-size="14">单一有序笼堆栈，让复合形变、链式分段和非对称端部编辑都能实时看见并控制。</text>
  <text x="88" y="1108" fill="#82909d" font-family="Segoe UI, Noto Sans CJK SC, Noto Sans JP, Noto Sans KR, sans-serif" font-size="14">Workflow snapshot based on public capabilities and typical setups; not a complete feature-parity claim. Product names are used for identification only.</text>
</svg>
