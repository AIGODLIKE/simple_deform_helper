<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Simple Deform Helper V2 워크플로 비교</title>
  <desc id="desc">통합 케이지 워크플로와 Maya, 3ds Max, MODO, Cinema 4D의 일반적인 변형 워크플로를 중립적으로 비교합니다.</desc>
  <rect width="1800" height="1200" fill="#151a20"/>
  <rect x="48" y="42" width="1704" height="1110" rx="18" fill="#20262e" stroke="#3d4b59" stroke-width="2"/>

  <text x="88" y="104" fill="#f5f8fb" font-family="Segoe UI, Noto Sans KR, sans-serif" font-size="40" font-weight="700">세계 선도 Simple Deform Helper V2</text>
  <text x="88" y="144" fill="#8fd6e7" font-family="Segoe UI, Noto Sans KR, sans-serif" font-size="24" font-weight="600">Blender를 위한 통합형 제작 케이지 워크플로</text>
  <text x="88" y="178" fill="#b4c1cc" font-family="Segoe UI, Noto Sans KR, sans-serif" font-size="18">복합 변형, 편집 가능한 체인 세그먼트, 비대칭 끝단 제어를 한곳에서 관리합니다.</text>
  <text x="1710" y="104" text-anchor="end" fill="#72d5ac" font-family="Segoe UI, Noto Sans KR, sans-serif" font-size="18" font-weight="600">단일 케이지 · 순서형 레이어 · 연결 체인</text>

  <rect x="88" y="216" width="1624" height="94" rx="9" fill="#2a333d"/>
  <text x="112" y="250" fill="#aebbc8" font-family="Segoe UI, Noto Sans KR, sans-serif" font-size="18" font-weight="700">워크플로 관점</text>
  <text x="112" y="280" fill="#dce4ea" font-family="Segoe UI, Noto Sans KR, sans-serif" font-size="15">제작 워크플로</text>
  <text x="510" y="262" fill="#8fd6e7" font-family="Segoe UI, Noto Sans KR, sans-serif" font-size="23" font-weight="700">Simple Deform Helper V2</text>
  <text x="510" y="288" fill="#72d5ac" font-family="Segoe UI, Noto Sans KR, sans-serif" font-size="15">통합 케이지 워크플로</text>
  <text x="942" y="270" fill="#e7b37e" font-family="Segoe UI, sans-serif" font-size="21" font-weight="700">Maya</text>
  <text x="1144" y="270" fill="#e7b37e" font-family="Segoe UI, sans-serif" font-size="21" font-weight="700">3ds Max</text>
  <text x="1358" y="270" fill="#e7b37e" font-family="Segoe UI, sans-serif" font-size="21" font-weight="700">MODO</text>
  <text x="1530" y="270" fill="#e7b37e" font-family="Segoe UI, sans-serif" font-size="21" font-weight="700">Cinema 4D</text>

  <g font-family="Segoe UI, Noto Sans CJK SC, Noto Sans JP, Noto Sans KR, sans-serif" font-size="17">
    <g transform="translate(0 326)"><rect x="88" y="0" width="1624" height="76" fill="#252e37"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans KR, sans-serif" font-weight="600">단일 케이지 복합 변형</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans KR, sans-serif" font-size="14">네 가지 작업을 하나의 영역에서 관리</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans KR, sans-serif" font-weight="700">✓ 구부리기 + 비틀기 + 테이퍼 + 늘리기</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans KR, sans-serif" font-size="14">하나의 순서형 레이어 목록</text><text x="942" y="44" fill="#d8a875">△ 별도 디포머 / 리그</text><text x="1144" y="44" fill="#d8a875">△ 수정자 스택</text><text x="1358" y="44" fill="#d8a875">△ 디포머 스택</text><text x="1530" y="44" fill="#d8a875">△ 디포머 스택</text></g>
    <g transform="translate(0 402)"><rect x="88" y="0" width="1624" height="76" fill="#20262e"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans KR, sans-serif" font-weight="600">실시간 변형 순서</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans KR, sans-serif" font-size="14">셋업을 다시 만들지 않고 순서 변경</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans KR, sans-serif" font-weight="700">✓ 레이어를 드래그하고 즉시 확인</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans KR, sans-serif" font-size="14">구부리기 → 비틀기 → 테이퍼 → 늘리기</text><text x="942" y="44" fill="#c3ced7">△ 스택 / 노드 순서</text><text x="1144" y="44" fill="#c3ced7">△ 수정자 순서</text><text x="1358" y="44" fill="#c3ced7">△ 스택 순서</text><text x="1530" y="44" fill="#c3ced7">△ 스택 순서</text></g>
    <g transform="translate(0 478)"><rect x="88" y="0" width="1624" height="76" fill="#252e37"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans KR, sans-serif" font-weight="600">연결 체인 케이지</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans KR, sans-serif" font-size="14">하나의 연속된 형태에서 여러 영역을 편집</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans KR, sans-serif" font-weight="700">✓ 세그먼트 + 간격 + 자동 재연결</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans KR, sans-serif" font-size="14">전체 범위 유지</text><text x="942" y="44" fill="#d8a875">△ 수동 리그 / 디포머 연결</text><text x="1144" y="44" fill="#d8a875">△ 수동 체인 설정</text><text x="1358" y="44" fill="#d8a875">△ 수동 설정</text><text x="1530" y="44" fill="#d8a875">△ 수동 설정</text></g>
    <g transform="translate(0 554)"><rect x="88" y="0" width="1624" height="76" fill="#20262e"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans KR, sans-serif" font-weight="600">상단 / 하단 독립 제어</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans KR, sans-serif" font-size="14">재중앙 정렬 없이 비대칭 편집</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans KR, sans-serif" font-weight="700">✓ 끝단별 길이 + 스케일 + 오프셋</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans KR, sans-serif" font-size="14">강제 중심 대칭 없음</text><text x="942" y="44" fill="#c3ced7">△ 리그 설정에 따라 다름</text><text x="1144" y="44" fill="#c3ced7">△ 수정자 설정에 따라 다름</text><text x="1358" y="44" fill="#c3ced7">△ 셋업에 따라 다름</text><text x="1530" y="44" fill="#c3ced7">△ 셋업에 따라 다름</text></g>
    <g transform="translate(0 630)"><rect x="88" y="0" width="1624" height="76" fill="#252e37"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans KR, sans-serif" font-weight="600">구부리기 경향과 축 미리보기</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans KR, sans-serif" font-size="14">뷰포트에서 원하는 방향을 선택</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans KR, sans-serif" font-weight="700">✓ 6면 × 2경향 + 정렬 및 맞춤</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans KR, sans-serif" font-size="14">형태별 뷰포트 컨트롤러</text><text x="942" y="44" fill="#c3ced7">△ 뷰포트 / 리그 설정</text><text x="1144" y="44" fill="#c3ced7">△ 뷰포트 / 수정자 설정</text><text x="1358" y="44" fill="#c3ced7">△ 뷰포트 설정</text><text x="1530" y="44" fill="#c3ced7">△ 뷰포트 설정</text></g>
    <g transform="translate(0 706)"><rect x="88" y="0" width="1624" height="76" fill="#20262e"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans KR, sans-serif" font-weight="600">비파괴 노드 워크플로</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans KR, sans-serif" font-size="14">인수인계 후에도 읽고 유지 가능</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans KR, sans-serif" font-weight="700">✓ Geometry Nodes + 수정자 스택</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans KR, sans-serif" font-size="14">확인 가능, 애니메이션 가능</text><text x="942" y="44" fill="#c3ced7">△ 네이티브 그래프 / 리그</text><text x="1144" y="44" fill="#c3ced7">△ 네이티브 그래프 / 수정자</text><text x="1358" y="44" fill="#c3ced7">△ 네이티브 그래프</text><text x="1530" y="44" fill="#c3ced7">△ 네이티브 그래프</text></g>
    <g transform="translate(0 782)"><rect x="88" y="0" width="1624" height="76" fill="#252e37"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans KR, sans-serif" font-weight="600">경계와 겹침 보호</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans KR, sans-serif" font-size="14">끝단과 체인을 예측 가능하게 편집</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans KR, sans-serif" font-weight="700">✓ 오브젝트 경계 + 체인 겹침 방지</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans KR, sans-serif" font-size="14">간격과 접합부 동기화는 선택</text><text x="942" y="44" fill="#c3ced7">△ 수동 제약</text><text x="1144" y="44" fill="#c3ced7">△ 수동 제약</text><text x="1358" y="44" fill="#c3ced7">△ 수동 제약</text><text x="1530" y="44" fill="#c3ced7">△ 수동 제약</text></g>
    <g transform="translate(0 858)"><rect x="88" y="0" width="1624" height="76" fill="#20262e"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans KR, sans-serif" font-weight="600">다국어와 재현성</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans KR, sans-serif" font-size="14">네 가지 UI 언어에서 동일한 워크플로</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans KR, sans-serif" font-weight="700">✓ 영어 / 중국어 / 일본어 / 한국어</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans KR, sans-serif" font-size="14">동일한 조작과 의미</text><text x="942" y="44" fill="#c3ced7">△ 호스트 언어 지원</text><text x="1144" y="44" fill="#c3ced7">△ 호스트 언어 지원</text><text x="1358" y="44" fill="#c3ced7">△ 호스트 언어 지원</text><text x="1530" y="44" fill="#c3ced7">△ 호스트 언어 지원</text></g>
  </g>

  <rect x="88" y="970" width="1624" height="92" rx="8" fill="#182027" stroke="#315248"/>
  <text x="112" y="1003" fill="#72d5ac" font-family="Segoe UI, Noto Sans KR, sans-serif" font-size="18" font-weight="700">V2의 강점 한 문장</text>
  <text x="112" y="1034" fill="#d9f4e8" font-family="Segoe UI, Noto Sans KR, sans-serif" font-size="17">하나의 순서형 케이지 스택으로 복합 변형, 체인 분할, 비대칭 끝단 편집을 실시간으로 보고 제어합니다.</text>
  <text x="112" y="1058" fill="#b4c1cc" font-family="Segoe UI, Noto Sans KR, sans-serif" font-size="14">강점은 전체 워크플로에 있습니다. 분리된 설정을 줄이고 제어를 명확히 하며 반복 작업을 빠르게 합니다.</text>
  <text x="88" y="1108" fill="#82909d" font-family="Segoe UI, Noto Sans KR, sans-serif" font-size="14">공개 기능과 일반적인 설정을 바탕으로 한 비교이며 완전한 기능 동등성을 주장하지 않습니다. 제품명은 식별 목적으로만 사용합니다.</text>
</svg>
