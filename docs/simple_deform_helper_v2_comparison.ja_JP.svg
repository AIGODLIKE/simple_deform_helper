<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Simple Deform Helper V2 ワークフロー比較</title>
  <desc id="desc">統合ケージワークフローと Maya、3ds Max、MODO、Cinema 4D の一般的な変形ワークフローを中立的に比較します。</desc>
  <rect width="1800" height="1200" fill="#151a20"/>
  <rect x="48" y="42" width="1704" height="1110" rx="18" fill="#20262e" stroke="#3d4b59" stroke-width="2"/>

  <text x="88" y="104" fill="#f5f8fb" font-family="Segoe UI, Noto Sans JP, sans-serif" font-size="40" font-weight="700">世界をリードする Simple Deform Helper V2</text>
  <text x="88" y="144" fill="#8fd6e7" font-family="Segoe UI, Noto Sans JP, sans-serif" font-size="24" font-weight="600">Blender のための統合された実制作向けケージワークフロー</text>
  <text x="88" y="178" fill="#b4c1cc" font-family="Segoe UI, Noto Sans JP, sans-serif" font-size="18">複合変形、編集可能なチェーン、上下端の非対称操作を一つにまとめます。</text>
  <text x="1710" y="104" text-anchor="end" fill="#72d5ac" font-family="Segoe UI, Noto Sans JP, sans-serif" font-size="18" font-weight="600">1 つのケージ · 順序付きレイヤー · チェーン</text>

  <rect x="88" y="216" width="1624" height="94" rx="9" fill="#2a333d"/>
  <text x="112" y="250" fill="#aebbc8" font-family="Segoe UI, Noto Sans JP, sans-serif" font-size="18" font-weight="700">ワークフローの観点</text>
  <text x="112" y="280" fill="#dce4ea" font-family="Segoe UI, Noto Sans JP, sans-serif" font-size="15">実制作ワークフロー</text>
  <text x="510" y="262" fill="#8fd6e7" font-family="Segoe UI, Noto Sans JP, sans-serif" font-size="23" font-weight="700">Simple Deform Helper V2</text>
  <text x="510" y="288" fill="#72d5ac" font-family="Segoe UI, Noto Sans JP, sans-serif" font-size="15">統合ケージワークフロー</text>
  <text x="942" y="270" fill="#e7b37e" font-family="Segoe UI, sans-serif" font-size="21" font-weight="700">Maya</text>
  <text x="1144" y="270" fill="#e7b37e" font-family="Segoe UI, sans-serif" font-size="21" font-weight="700">3ds Max</text>
  <text x="1358" y="270" fill="#e7b37e" font-family="Segoe UI, sans-serif" font-size="21" font-weight="700">MODO</text>
  <text x="1530" y="270" fill="#e7b37e" font-family="Segoe UI, sans-serif" font-size="21" font-weight="700">Cinema 4D</text>

  <g font-family="Segoe UI, Noto Sans CJK SC, Noto Sans JP, Noto Sans KR, sans-serif" font-size="17">
    <g transform="translate(0 326)"><rect x="88" y="0" width="1624" height="76" fill="#252e37"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans JP, sans-serif" font-weight="600">1 ケージで複合変形</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans JP, sans-serif" font-size="14">4 つの操作を一つの表示領域で管理</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans JP, sans-serif" font-weight="700">✓ 曲げ + ねじり + テーパー + 伸縮</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans JP, sans-serif" font-size="14">順序付きレイヤー</text><text x="942" y="44" fill="#d8a875">△ 個別のデフォーマー / リグ</text><text x="1144" y="44" fill="#d8a875">△ モディファイアスタック</text><text x="1358" y="44" fill="#d8a875">△ デフォーマースタック</text><text x="1530" y="44" fill="#d8a875">△ デフォーマースタック</text></g>
    <g transform="translate(0 402)"><rect x="88" y="0" width="1624" height="76" fill="#20262e"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans JP, sans-serif" font-weight="600">変形順をリアルタイムに変更</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans JP, sans-serif" font-size="14">セットアップを作り直さずに並べ替え</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans JP, sans-serif" font-weight="700">✓ レイヤーをドラッグして即時確認</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans JP, sans-serif" font-size="14">曲げ → ねじり → テーパー → 伸縮</text><text x="942" y="44" fill="#c3ced7">△ スタック / ノード順</text><text x="1144" y="44" fill="#c3ced7">△ モディファイア順</text><text x="1358" y="44" fill="#c3ced7">△ スタック順</text><text x="1530" y="44" fill="#c3ced7">△ スタック順</text></g>
    <g transform="translate(0 478)"><rect x="88" y="0" width="1624" height="76" fill="#252e37"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans JP, sans-serif" font-weight="600">接続チェーンケージ</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans JP, sans-serif" font-size="14">連続した形状の局所領域を編集</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans JP, sans-serif" font-weight="700">✓ 分割 + 間隔 + 自動再接続</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans JP, sans-serif" font-size="14">全体の範囲を維持</text><text x="942" y="44" fill="#d8a875">△ 手動リグ / 接続</text><text x="1144" y="44" fill="#d8a875">△ 手動チェーン設定</text><text x="1358" y="44" fill="#d8a875">△ 手動設定</text><text x="1530" y="44" fill="#d8a875">△ 手動設定</text></g>
    <g transform="translate(0 554)"><rect x="88" y="0" width="1624" height="76" fill="#20262e"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans JP, sans-serif" font-weight="600">上端 / 下端を個別に操作</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans JP, sans-serif" font-size="14">再センタリングなしで非対称編集</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans JP, sans-serif" font-weight="700">✓ 各端の長さ + スケール + オフセット</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans JP, sans-serif" font-size="14">中心対称を強制しない</text><text x="942" y="44" fill="#c3ced7">△ リグ設定に依存</text><text x="1144" y="44" fill="#c3ced7">△ モディファイア設定に依存</text><text x="1358" y="44" fill="#c3ced7">△ セットアップに依存</text><text x="1530" y="44" fill="#c3ced7">△ セットアップに依存</text></g>
    <g transform="translate(0 630)"><rect x="88" y="0" width="1624" height="76" fill="#252e37"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans JP, sans-serif" font-weight="600">曲げ傾向と軸をプレビュー</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans JP, sans-serif" font-size="14">ビューポートで意図した方向を選択</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans JP, sans-serif" font-weight="700">✓ 6 面 × 2 傾向 + 整列と適合</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans JP, sans-serif" font-size="14">形状に合わせたビューポート操作</text><text x="942" y="44" fill="#c3ced7">△ ビュー / リグ設定</text><text x="1144" y="44" fill="#c3ced7">△ ビュー / モディファイア設定</text><text x="1358" y="44" fill="#c3ced7">△ ビュー設定</text><text x="1530" y="44" fill="#c3ced7">△ ビュー設定</text></g>
    <g transform="translate(0 706)"><rect x="88" y="0" width="1624" height="76" fill="#20262e"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans JP, sans-serif" font-weight="600">非破壊ノードワークフロー</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans JP, sans-serif" font-size="14">引き継ぎ後も読みやすく保守可能</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans JP, sans-serif" font-weight="700">✓ Geometry Nodes + スタック</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans JP, sans-serif" font-size="14">確認可能、アニメーション可能</text><text x="942" y="44" fill="#c3ced7">△ ネイティブグラフ / リグ</text><text x="1144" y="44" fill="#c3ced7">△ ネイティブグラフ / モディファイア</text><text x="1358" y="44" fill="#c3ced7">△ ネイティブグラフ</text><text x="1530" y="44" fill="#c3ced7">△ ネイティブグラフ</text></g>
    <g transform="translate(0 782)"><rect x="88" y="0" width="1624" height="76" fill="#252e37"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans JP, sans-serif" font-weight="600">境界と重なりを保護</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans JP, sans-serif" font-size="14">端部とチェーンを予測可能に編集</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans JP, sans-serif" font-weight="700">✓ オブジェクト境界 + 重なり防止</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans JP, sans-serif" font-size="14">間隔と継ぎ目同期は任意</text><text x="942" y="44" fill="#c3ced7">△ 手動制約</text><text x="1144" y="44" fill="#c3ced7">△ 手動制約</text><text x="1358" y="44" fill="#c3ced7">△ 手動制約</text><text x="1530" y="44" fill="#c3ced7">△ 手動制約</text></g>
    <g transform="translate(0 858)"><rect x="88" y="0" width="1624" height="76" fill="#20262e"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans JP, sans-serif" font-weight="600">多言語と再現性</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans JP, sans-serif" font-size="14">4 言語で同じワークフロー</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans JP, sans-serif" font-weight="700">✓ 英語 / 簡体字 / 日本語 / 韓国語</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans JP, sans-serif" font-size="14">操作と意味を統一</text><text x="942" y="44" fill="#c3ced7">△ ホスト言語の対応</text><text x="1144" y="44" fill="#c3ced7">△ ホスト言語の対応</text><text x="1358" y="44" fill="#c3ced7">△ ホスト言語の対応</text><text x="1530" y="44" fill="#c3ced7">△ ホスト言語の対応</text></g>
  </g>

  <rect x="88" y="970" width="1624" height="92" rx="8" fill="#182027" stroke="#315248"/>
  <text x="112" y="1003" fill="#72d5ac" font-family="Segoe UI, Noto Sans JP, sans-serif" font-size="18" font-weight="700">V2 の強みを一言で</text>
  <text x="112" y="1034" fill="#d9f4e8" font-family="Segoe UI, Noto Sans JP, sans-serif" font-size="17">一つの順序付きケージで、複合変形、チェーン分割、非対称な端部編集をリアルタイムに確認・操作できます。</text>
  <text x="112" y="1058" fill="#b4c1cc" font-family="Segoe UI, Noto Sans JP, sans-serif" font-size="14">強みは一連のワークフローです。分断された設定を減らし、制御を明確にして反復を速めます。</text>
  <text x="88" y="1108" fill="#82909d" font-family="Segoe UI, Noto Sans JP, sans-serif" font-size="14">公開情報と一般的な設定に基づく比較であり、完全な機能同等性を主張するものではありません。製品名は識別のために使用しています。</text>
</svg>
