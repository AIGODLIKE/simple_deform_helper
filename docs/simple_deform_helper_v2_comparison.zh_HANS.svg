<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">简易变形器 V2 工作流对比</title>
  <desc id="desc">统一笼式工作流与 Maya、3ds Max、MODO、Cinema 4D 常见形变工作流的中立对比。</desc>
  <rect width="1800" height="1200" fill="#151a20"/>
  <rect x="48" y="42" width="1704" height="1110" rx="18" fill="#20262e" stroke="#3d4b59" stroke-width="2"/>

  <text x="88" y="104" fill="#f5f8fb" font-family="Segoe UI, Noto Sans CJK SC, sans-serif" font-size="40" font-weight="700">世界领先的简易变形器 V2</text>
  <text x="88" y="144" fill="#8fd6e7" font-family="Segoe UI, Noto Sans CJK SC, sans-serif" font-size="24" font-weight="600">面向生产的 Blender 统一笼式工作流</text>
  <text x="88" y="178" fill="#b4c1cc" font-family="Segoe UI, Noto Sans CJK SC, sans-serif" font-size="18">复合形变、可编辑链式分段，以及非对称端部控制。</text>
  <text x="1710" y="104" text-anchor="end" fill="#72d5ac" font-family="Segoe UI, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="600">单笼 · 有序形变层 · 链式笼</text>

  <rect x="88" y="216" width="1624" height="94" rx="9" fill="#2a333d"/>
  <text x="112" y="250" fill="#aebbc8" font-family="Segoe UI, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700">工作流维度</text>
  <text x="112" y="280" fill="#dce4ea" font-family="Segoe UI, Noto Sans CJK SC, sans-serif" font-size="15">生产工作流</text>
  <text x="510" y="262" fill="#8fd6e7" font-family="Segoe UI, Noto Sans CJK SC, sans-serif" font-size="23" font-weight="700">简易变形器 V2</text>
  <text x="510" y="288" fill="#72d5ac" font-family="Segoe UI, Noto Sans CJK SC, sans-serif" font-size="15">统一笼式工作流</text>
  <text x="942" y="270" fill="#e7b37e" font-family="Segoe UI, sans-serif" font-size="21" font-weight="700">Maya</text>
  <text x="1144" y="270" fill="#e7b37e" font-family="Segoe UI, sans-serif" font-size="21" font-weight="700">3ds Max</text>
  <text x="1358" y="270" fill="#e7b37e" font-family="Segoe UI, sans-serif" font-size="21" font-weight="700">MODO</text>
  <text x="1530" y="270" fill="#e7b37e" font-family="Segoe UI, sans-serif" font-size="21" font-weight="700">Cinema 4D</text>

  <g font-family="Segoe UI, Noto Sans CJK SC, Noto Sans JP, Noto Sans KR, sans-serif" font-size="17">
    <g transform="translate(0 326)"><rect x="88" y="0" width="1624" height="76" fill="#252e37"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans CJK SC, sans-serif" font-weight="600">单笼复合形变</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans CJK SC, sans-serif" font-size="14">四种操作，共享一个可见区域</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans CJK SC, sans-serif" font-weight="700">✓ 弯曲 + 扭转 + 锥化 + 拉伸</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans CJK SC, sans-serif" font-size="14">一个有序形变层列表</text><text x="942" y="44" fill="#d8a875">△ 分离的形变器 / 绑定</text><text x="1144" y="44" fill="#d8a875">△ 修改器堆栈</text><text x="1358" y="44" fill="#d8a875">△ 形变器堆栈</text><text x="1530" y="44" fill="#d8a875">△ 形变器堆栈</text></g>
    <g transform="translate(0 402)"><rect x="88" y="0" width="1624" height="76" fill="#20262e"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans CJK SC, sans-serif" font-weight="600">实时形变顺序</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans CJK SC, sans-serif" font-size="14">无需重建即可调整顺序</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans CJK SC, sans-serif" font-weight="700">✓ 拖动形变层并立即预览</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans CJK SC, sans-serif" font-size="14">弯曲 → 扭转 → 锥化 → 拉伸</text><text x="942" y="44" fill="#c3ced7">△ 堆栈 / 节点排序</text><text x="1144" y="44" fill="#c3ced7">△ 修改器排序</text><text x="1358" y="44" fill="#c3ced7">△ 堆栈排序</text><text x="1530" y="44" fill="#c3ced7">△ 堆栈排序</text></g>
    <g transform="translate(0 478)"><rect x="88" y="0" width="1624" height="76" fill="#252e37"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans CJK SC, sans-serif" font-weight="600">链式笼</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans CJK SC, sans-serif" font-size="14">沿连续物体编辑多个局部区域</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans CJK SC, sans-serif" font-weight="700">✓ 分段 + 间隔 + 自动重连</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans CJK SC, sans-serif" font-size="14">保持整体范围</text><text x="942" y="44" fill="#d8a875">△ 手动绑定 / 形变器连接</text><text x="1144" y="44" fill="#d8a875">△ 手动链式设置</text><text x="1358" y="44" fill="#d8a875">△ 手动设置</text><text x="1530" y="44" fill="#d8a875">△ 手动设置</text></g>
    <g transform="translate(0 554)"><rect x="88" y="0" width="1624" height="76" fill="#20262e"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans CJK SC, sans-serif" font-weight="600">顶部 / 底部独立控制</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans CJK SC, sans-serif" font-size="14">非对称调整，不强制重新居中</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans CJK SC, sans-serif" font-weight="700">✓ 每端独立长度 + 缩放 + 偏移</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans CJK SC, sans-serif" font-size="14">不受中心对称限制</text><text x="942" y="44" fill="#c3ced7">△ 取决于绑定设置</text><text x="1144" y="44" fill="#c3ced7">△ 取决于修改器设置</text><text x="1358" y="44" fill="#c3ced7">△ 取决于设置</text><text x="1530" y="44" fill="#c3ced7">△ 取决于设置</text></g>
    <g transform="translate(0 630)"><rect x="88" y="0" width="1624" height="76" fill="#252e37"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans CJK SC, sans-serif" font-weight="600">弯曲趋势与轴向预览</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans CJK SC, sans-serif" font-size="14">在视图中选择想要的弯曲方向</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans CJK SC, sans-serif" font-weight="700">✓ 六个面 × 两种趋势 + 对齐并适配</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans CJK SC, sans-serif" font-size="14">与形变类型对应的视图控制器</text><text x="942" y="44" fill="#c3ced7">△ 视图 / 绑定设置</text><text x="1144" y="44" fill="#c3ced7">△ 视图 / 修改器设置</text><text x="1358" y="44" fill="#c3ced7">△ 视图设置</text><text x="1530" y="44" fill="#c3ced7">△ 视图设置</text></g>
    <g transform="translate(0 706)"><rect x="88" y="0" width="1624" height="76" fill="#20262e"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans CJK SC, sans-serif" font-weight="600">非破坏节点工作流</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans CJK SC, sans-serif" font-size="14">交接后仍然可读、可维护</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans CJK SC, sans-serif" font-weight="700">✓ 几何节点 + 修改器堆栈</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans CJK SC, sans-serif" font-size="14">可检查、可动画</text><text x="942" y="44" fill="#c3ced7">△ 原生节点 / 绑定</text><text x="1144" y="44" fill="#c3ced7">△ 原生节点 / 修改器</text><text x="1358" y="44" fill="#c3ced7">△ 原生节点</text><text x="1530" y="44" fill="#c3ced7">△ 原生节点</text></g>
    <g transform="translate(0 782)"><rect x="88" y="0" width="1624" height="76" fill="#252e37"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans CJK SC, sans-serif" font-weight="600">边界与防交叠</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans CJK SC, sans-serif" font-size="14">端部和链式编辑更可预测</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans CJK SC, sans-serif" font-weight="700">✓ 物体边界 + 链式防交叠逻辑</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans CJK SC, sans-serif" font-size="14">可选间隔与接缝同步</text><text x="942" y="44" fill="#c3ced7">△ 手动约束</text><text x="1144" y="44" fill="#c3ced7">△ 手动约束</text><text x="1358" y="44" fill="#c3ced7">△ 手动约束</text><text x="1530" y="44" fill="#c3ced7">△ 手动约束</text></g>
    <g transform="translate(0 858)"><rect x="88" y="0" width="1624" height="76" fill="#20262e"/><text x="112" y="28" fill="#f5f8fb" font-family="Noto Sans CJK SC, sans-serif" font-weight="600">多语言与可重复</text><text x="112" y="54" fill="#aebbc8" font-family="Noto Sans CJK SC, sans-serif" font-size="14">四种界面语言使用同一套逻辑</text><text x="510" y="32" fill="#72d5ac" font-family="Noto Sans CJK SC, sans-serif" font-weight="700">✓ 英 / 简中 / 日 / 韩</text><text x="510" y="58" fill="#d9f4e8" font-family="Noto Sans CJK SC, sans-serif" font-size="14">控制方式与语义一致</text><text x="942" y="44" fill="#c3ced7">△ 宿主语言覆盖</text><text x="1144" y="44" fill="#c3ced7">△ 宿主语言覆盖</text><text x="1358" y="44" fill="#c3ced7">△ 宿主语言覆盖</text><text x="1530" y="44" fill="#c3ced7">△ 宿主语言覆盖</text></g>
  </g>

  <rect x="88" y="970" width="1624" height="92" rx="8" fill="#182027" stroke="#315248"/>
  <text x="112" y="1003" fill="#72d5ac" font-family="Segoe UI, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700">V2 优势一句话</text>
  <text x="112" y="1034" fill="#d9f4e8" font-family="Segoe UI, Noto Sans CJK SC, sans-serif" font-size="17">单一有序笼堆栈，让复合形变、链式分段和非对称端部编辑都能实时看见并控制。</text>
  <text x="112" y="1058" fill="#b4c1cc" font-family="Segoe UI, Noto Sans CJK SC, sans-serif" font-size="14">优势来自完整工作流：更少的断开式设置、更清晰的控制和更快的迭代。</text>
  <text x="88" y="1108" fill="#82909d" font-family="Segoe UI, Noto Sans CJK SC, sans-serif" font-size="14">基于公开能力和典型设置的工作流快照，不代表完整功能对等；产品名称仅用于识别。</text>
</svg>
